<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>JobFlow — Регистрация</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <link rel="stylesheet" href="css\register.css">
</head>

<body>

<div class="top-nav">
    <div class="nav-container">

        <div class="nav-links">
            <a href="index.html"><i class="fas fa-briefcase"></i> Ищу работу</a>
            <a href="sotrudnick.html"><i class="fas fa-users"></i> Ищу сотрудника</a>
            <a href="servise.html"><i class="fas fa-concierge-bell"></i> Сервисы</a>
            <a href="help.html"><i class="fas fa-question-circle"></i> Помощь</a>
        </div>

        <div class="nav-right">
            <a href="city.html"><i class="fas fa-map-marker-alt"></i> Брянск</a>

            <a href="login.html">
                <i class="fas fa-sign-in-alt"></i> Войти
            </a>

            <a href="rezume.html" class="btn-resume">
                <i class="fas fa-file-alt"></i> Создать резюме
            </a>
        </div>

    </div>
</div>

<div class="main-wrapper">

    <div class="card" id="registerCard">

        <div class="card-tabs">
            <button class="tab active" data-tab="phone" onclick="switchTab('phone')">
                <i class="fas fa-mobile-alt"></i>
                Телефон
            </button>
            <button class="tab" data-tab="email" onclick="switchTab('email')">
                <i class="fas fa-envelope"></i>
                Почта
            </button>
        </div>

        <div class="card-content">

            <h1>Создайте аккаунт</h1>

            <div class="error-banner" id="errorBanner" style="display:none;">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <form id="registerForm">

                <div class="tab-content active" id="phoneTab">

                    <div class="input-group">
                        <div class="label">
                            <i class="fas fa-mobile-alt"></i>
                            <span>Номер телефона</span>
                        </div>
                        <input type="tel" id="regPhone" class="form-input" placeholder="+7 (999) 123-45-67" autocomplete="off">
                    </div>

                </div>

                <div class="tab-content" id="emailTab">

                    <div class="input-group">
                        <div class="label">
                            <i class="fas fa-envelope"></i>
                            <span>Электронная почта</span>
                        </div>
                        <input type="email" id="regEmail" class="form-input" placeholder="example@mail.ru" autocomplete="off">
                    </div>

                </div>

                <div class="input-group">
                    <div class="label">
                        <i class="fas fa-user"></i>
                        <span>Имя и фамилия</span>
                    </div>
                    <input type="text" id="regName" class="form-input" placeholder="Иван Иванов" autocomplete="off">
                </div>

                <div class="input-group">
                    <div class="label">
                        <i class="fas fa-lock"></i>
                        <span>Пароль</span>
                    </div>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="passwordInput" placeholder="Минимум 8 символов" autocomplete="off">
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                        <span class="strength-text" id="strengthText"></span>
                    </div>
                </div>

                <div class="input-group">
                    <div class="label">
                        <i class="fas fa-lock"></i>
                        <span>Повторите пароль</span>
                    </div>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="passwordConfirm" placeholder="Введите пароль ещё раз" autocomplete="off">
                        <button type="button" class="toggle-password" onclick="toggleConfirm()">
                            <i class="fas fa-eye" id="eyeIconConfirm"></i>
                        </button>
                    </div>
                </div>

                <div class="role-select">
                    <div class="role-label">Я ищу:</div>
                    <div class="role-options">
                        <label class="role-card">
                            <input type="radio" name="role" value="seeker" checked>
                            <div class="role-content">
                                <i class="fas fa-briefcase"></i>
                                <span>Работу</span>
                            </div>
                        </label>
                        <label class="role-card">
                            <input type="radio" name="role" value="employer">
                            <div class="role-content">
                                <i class="fas fa-users"></i>
                                <span>Сотрудников</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="legal">

                    <i class="fas fa-shield-alt"></i>

                    <span>
                        Регистрируясь, вы принимаете
                        <a href="#">соглашение</a>
                        и
                        <a href="#">политику конфиденциальности</a>
                    </span>

                </div>

                <button type="submit" class="btn btn-full">
                    <i class="fas fa-user-plus"></i>
                    Зарегистрироваться
                </button>

            </form>

            <div class="divider">
                <span>или</span>
            </div>

            <div class="social-row">
                <button class="social-btn" type="button" title="ВКонтакте">
                    <i class="fab fa-vk"></i>
                </button>
                <button class="social-btn" type="button" title="Яндекс">
                    <i class="fab fa-yandex-international"></i>
                </button>
                <button class="social-btn" type="button" title="Telegram">
                    <i class="fab fa-telegram-plane"></i>
                </button>
            </div>

            <div class="bottom-text">
                Уже есть аккаунт?
                <a href="login.html">Войти</a>
            </div>

        </div>

    </div>

</div>

<script>
function showError(msg) {
    var banner = document.getElementById('errorBanner');
    var text = document.getElementById('errorText');
    text.textContent = msg;
    banner.style.display = 'flex';
    banner.classList.remove('shake');
    void banner.offsetWidth;
    banner.classList.add('shake');
}

function hideError() {
    document.getElementById('errorBanner').style.display = 'none';
}

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    document.querySelector('.tab[data-tab="' + tab + '"]').classList.add('active');
    document.getElementById(tab + 'Tab').classList.add('active');
    var tabsEl = document.querySelector('.card-tabs');
    if (tab === 'email') {
        tabsEl.setAttribute('data-active', 'email');
    } else {
        tabsEl.removeAttribute('data-active');
    }
    hideError();
}

function togglePassword() {
    var input = document.getElementById('passwordInput');
    var icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}

function toggleConfirm() {
    var input = document.getElementById('passwordConfirm');
    var icon = document.getElementById('eyeIconConfirm');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}

document.getElementById('passwordInput').addEventListener('input', function() {
    var val = this.value;
    var fill = document.getElementById('strengthFill');
    var text = document.getElementById('strengthText');
    var strength = 0;
    if (val.length >= 8) strength++;
    if (val.length >= 12) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;

    fill.style.width = (strength / 5 * 100) + '%';
    if (strength <= 1) {
        fill.style.background = '#e25c5c';
        text.textContent = val.length > 0 ? 'Слабый' : '';
    } else if (strength <= 3) {
        fill.style.background = '#e8730c';
        text.textContent = 'Средний';
    } else {
        fill.style.background = '#2cb07e';
        text.textContent = 'Надёжный';
    }
});

document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    hideError();

    var activeTab = document.querySelector('.card-tabs').getAttribute('data-active');
    var email = '';
    var phone = document.getElementById('regPhone').value.trim();
    if (activeTab === 'email') {
        email = document.getElementById('regEmail').value.trim();
    }
    var password = document.getElementById('passwordInput').value;
    var passwordConfirm = document.getElementById('passwordConfirm').value;
    var role = document.querySelector('input[name="role"]:checked').value;
    var nameParts = document.getElementById('regName').value.trim().split(' ');
    var firstName = nameParts[0] || '';
    var surname = nameParts.slice(1).join(' ') || '';

    if (password !== passwordConfirm) {
        showError('Пароли не совпадают');
        return;
    }

    if (password.length < 8) {
        showError('Пароль должен быть не менее 8 символов');
        return;
    }

    if (role === 'seeker') role = 'candidate';

    if (!email && !phone) {
        showError('Укажите email или номер телефона');
        return;
    }

    if (activeTab !== 'email' && !phone) {
        showError('Введите номер телефона');
        return;
    }

    if (activeTab === 'email' && !email) {
        showError('Введите email');
        return;
    }

    var submitBtn = this.querySelector('button[type="submit"]');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Регистрация...';

    var payload = {password: password, role: role, first_name: firstName, surname: surname};
    if (email) payload.email = email;
    if (phone) payload.phone = phone;

    fetch('/api/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Зарегистрироваться';
        if (data.access_token) {
            localStorage.setItem('jobflow_token', data.access_token);
            localStorage.removeItem('jobflow_phone');
            window.location.href = 'account.html';
        } else {
            var msg = data.detail || 'Ошибка регистрации';
            if (msg === 'Email already registered') msg = 'Этот email уже зарегистрирован';
            if (msg === 'Телефон уже зарегистрирован') msg = 'Этот телефон уже зарегистрирован';
            showError(msg);
        }
    })
    .catch(function(err) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Зарегистрироваться';
        showError('Ошибка сети. Проверьте подключение.');
    });
});

(function() {
    var params = new URLSearchParams(window.location.search);
    var phone = params.get('phone') || localStorage.getItem('jobflow_phone') || '';
    if (phone) {
        document.getElementById('regPhone').value = phone;
    }
})();
</script>
<script src="city-loader.js"></script>
<script src="nav-auth.js"></script>

</body>
</html>
