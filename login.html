<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>JobFlow — Вход</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <link rel="stylesheet" href="css\login.css">
</head>

<body>

<div class="top-nav">
    <div class="nav-container">

        <div class="nav-links">
            <a href="index.html"><i class="fas fa-briefcase"></i> Ищу работу</a>
            <a href="sotrudnick.html"><i class="fas fa-users"></i> Ищу сотрудника</a>
            <a href="servise.html"><i class="fas fa-concierge-bell"></i> Сервисы</a>
            <a href="help.html"><i class="fas fa-question-circle"></i> Помощь</a>
        </div>

        <div class="nav-right">
            <a href="city.html"><i class="fas fa-map-marker-alt"></i> Брянск</a>

            <a href="login.html" class="active-link">
                <i class="fas fa-sign-in-alt"></i> Войти
            </a>

            <a href="rezume.html" class="btn-resume">
                <i class="fas fa-file-alt"></i> Создать резюме
            </a>
        </div>

    </div>
</div>

<div class="main-wrapper">

    <div class="card" id="loginCard">

        <div class="card-tabs">
            <button class="tab active" data-tab="phone" onclick="switchTab('phone')">
                <i class="fas fa-mobile-alt"></i>
                Телефон
            </button>
            <button class="tab" data-tab="email" onclick="switchTab('email')">
                <i class="fas fa-envelope"></i>
                Почта
            </button>
        </div>

        <div class="card-content">

            <h1>Войдите в аккаунт</h1>

            <div class="error-banner" id="errorBanner" style="display:none;">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <form id="loginForm">

                <div class="tab-content active" id="phoneTab">

                    <div class="input-group">
                        <div class="label">
                            <i class="fas fa-mobile-alt"></i>
                            <span>Номер телефона</span>
                        </div>
                        <input type="tel" id="loginPhone" class="form-input" placeholder="+7 (999) 123-45-67" autocomplete="off">
                    </div>

                </div>

                <div class="tab-content" id="emailTab">

                    <div class="input-group">
                        <div class="label">
                            <i class="fas fa-envelope"></i>
                            <span>Электронная почта</span>
                        </div>
                        <input type="email" id="loginEmail" class="form-input" placeholder="example@mail.ru" autocomplete="off">
                    </div>

                </div>

                <div class="input-group">
                    <div class="label">
                        <i class="fas fa-lock"></i>
                        <span>Пароль</span>
                    </div>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="loginPassword" placeholder="Введите пароль" autocomplete="off">
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="remember-row">
                    <label class="checkbox-label">
                        <input type="checkbox" checked>
                        <span class="checkmark"></span>
                        <span>Запомнить меня</span>
                    </label>
                    <a href="#" class="forgot-link">Забыли пароль?</a>
                </div>

                <button type="submit" class="btn btn-full">
                    <i class="fas fa-sign-in-alt"></i>
                    Войти
                </button>

            </form>

            <div class="divider">
                <span>или</span>
            </div>

            <div class="social-row">
                <button class="social-btn" type="button" title="ВКонтакте">
                    <i class="fab fa-vk"></i>
                </button>
                <button class="social-btn" type="button" title="Яндекс">
                    <i class="fab fa-yandex-international"></i>
                </button>
                <button class="social-btn" type="button" title="Telegram">
                    <i class="fab fa-telegram-plane"></i>
                </button>
            </div>

            <div class="bottom-text">
                Ещё нет аккаунта?
                <a href="register.html">Зарегистрироваться</a>
            </div>

        </div>

    </div>

</div>

<script>
function showError(msg) {
    var banner = document.getElementById('errorBanner');
    var text = document.getElementById('errorText');
    text.textContent = msg;
    banner.style.display = 'flex';
    banner.classList.remove('shake');
    void banner.offsetWidth;
    banner.classList.add('shake');
}

function hideError() {
    document.getElementById('errorBanner').style.display = 'none';
}

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    document.querySelector('.tab[data-tab="' + tab + '"]').classList.add('active');
    document.getElementById(tab + 'Tab').classList.add('active');
    hideError();
}

function togglePassword() {
    var input = document.getElementById('loginPassword');
    var icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    hideError();

    var activeTab = document.querySelector('.tab.active').getAttribute('data-tab');
    var email = document.getElementById('loginEmail').value.trim();
    var phone = document.getElementById('loginPhone').value.trim();
    var password = document.getElementById('loginPassword').value;

    if (activeTab === 'phone' && !phone) {
        showError('Введите номер телефона');
        return;
    }
    if (activeTab === 'email' && !email) {
        showError('Введите email');
        return;
    }
    if (!password) {
        showError('Введите пароль');
        return;
    }

    var submitBtn = this.querySelector('button[type="submit"]');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Вход...';

    fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email: email, password: password, phone: phone, login_type: activeTab})
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Войти';
        if (data.access_token) {
            localStorage.setItem('jobflow_token', data.access_token);
            window.location.href = 'index.html';
        } else {
            showError(data.detail || 'Ошибка входа');
        }
    })
    .catch(function(err) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Войти';
        showError('Ошибка сети. Проверьте подключение.');
    });
});

(function() {
    var params = new URLSearchParams(window.location.search);
    var phone = params.get('phone') || localStorage.getItem('jobflow_phone') || '';
    if (phone) {
        document.getElementById('loginPhone').value = phone;
        switchTab('phone');
    }
})();
</script>
<script src="city-loader.js"></script>
<script src="nav-auth.js"></script>

</body>
</html>
