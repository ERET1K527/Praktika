version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: jobflow
      POSTGRES_PASSWORD: jobflow123
      POSTGRES_DB: jobflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://jobflow:jobflow123@db:5432/jobflow
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: super-secret-key-change-in-production
    depends_on:
      - db
      - redis
    volumes:
      - ./app/static:/app/app/static

volumes:
  pgdata:
